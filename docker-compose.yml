services:
  nginx:
    image: nginx:alpine
    container_name: neograg-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - neograg_network

  redis:
    image: redis:7-alpine
    container_name: neograg-redis
    command: redis-server --appendonly yes
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - neograg_network

  backend:
    image: neograg-backend:latest
    container_name: neograg-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      HF_HOME: /hf_cache
      HF_HUB_CACHE: /hf_cache/hub
      TRANSFORMERS_CACHE: /hf_cache/transformers
      TORCH_HOME: /hf_cache/torch
    expose:
      - "8000"
    volumes:
      - hf_cache:/hf_cache
      - ./backend/cache:/app/cache
      - ./backend/chroma_data:/app/chroma_data
      - ./backend/data:/app/data:ro
    depends_on:
      - redis
    networks:
      - neograg_network

  frontend:
    image: neograg-frontend:latest
    container_name: neograg-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - neograg_network

networks:
  neograg_network:
    driver: bridge

volumes:
  hf_cache:
  redis_data:
