services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: neograg-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    env_file:
      - .env
    depends_on:
      - nginx
    networks:
      - neograg_network

  nginx:
    image: nginx:alpine
    container_name: neograg-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./maintenance:/usr/share/nginx/html:ro
    networks:
      - neograg_network

  postgres:
    image: postgres:17
    container_name: neograg-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-neograg}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - neograg_network

  redis:
    image: redis:7-alpine
    container_name: neograg-redis
    command: redis-server --appendonly yes
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - neograg_network

frontend:
    image: neograg-frontend:latest
    container_name: neograg-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    environment:
      - SYSTEM_PROMPT_REBOT=${SYSTEM_PROMPT_REBOT}
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - neograg_network

networks:
  neograg_network:
    driver: bridge

volumes:
  hf_cache:
  redis_data:
  postgres_data:
