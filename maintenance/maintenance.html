<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REBot - Đang bảo trì</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=K2D:wght@400;500;600;700&display=swap');

    :root {
      --primary: #1f5ca9;
      --accent: #00afef;
      --bg: #f4f7fb;
      --text: #333333;
      --text-muted: #777777;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Be Vietnam Pro', 'K2D', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .scene {
      position: relative;
      width: 100%;
      max-width: 480px;
      padding: 40px 32px;
      text-align: center;
    }

    .bg-shapes {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.05;
    }

    .shape-1 {
      width: 500px;
      height: 500px;
      background: var(--primary);
      top: -180px;
      left: -120px;
    }

    .shape-2 {
      width: 350px;
      height: 350px;
      background: var(--accent);
      bottom: -100px;
      right: -80px;
    }

    .shape-3 {
      width: 200px;
      height: 200px;
      background: var(--primary);
      bottom: 30%;
      left: 10%;
    }

    .shape-4 {
      width: 140px;
      height: 140px;
      background: var(--accent);
      top: 20%;
      right: 8%;
    }

    .illustration {
      width: 140px;
      height: 140px;
      margin: 0 auto 28px;
    }

    .illustration svg {
      width: 100%;
      height: 100%;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }

    p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      font-weight: 400;
      margin-bottom: 20px;
    }

    .contact {
      font-size: 13px;
      color: var(--text-muted);
    }

    .contact a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .contact a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
  </div>

  <div class="scene">
    <div class="card">
      <div class="illustration">
        <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="60" cy="60" r="50" stroke="#1f5ca9" stroke-width="2" opacity="0.15"/>
          <circle cx="60" cy="60" r="38" stroke="#00afef" stroke-width="2.5" stroke-dasharray="8 4" opacity="0.4"/>
          <circle cx="60" cy="60" r="26" fill="#f4f7fb" stroke="#1f5ca9" stroke-width="2"/>
          <path d="M60 40v24l16 10" stroke="#00afef" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="60" cy="60" r="4" fill="#00afef"/>
        </svg>
      </div>

      <h1>Hệ thống đang được bảo trì</h1>
      <p>
        REBot đang trong quá trình cập nhật để phục vụ bạn tốt hơn.<br>
        Vui lòng quay lại sau vài phút.
      </p>

      <div class="contact">
        Cần hỗ trợ ngay? Liên hệ <a href="https://dsa.ctu.edu.vn">dsa.ctu.edu.vn</a>
      </div>
    </div>
  </div>
</body>
</html>
